# litellm proxy config — translates Anthropic Messages API → Ollama
#
# All models from the local Ollama instance are exposed.
# LiteLLM auto-maps model names: requests for "qwen3:8b" route to ollama/qwen3:8b
#
# Docs: https://docs.litellm.ai/docs/proxy/configs

model_list:
  # -- Gemma --
  - model_name: "gemma3:12b-it-qat"
    litellm_params:
      model: "ollama/gemma3:12b-it-qat"
      api_base: "http://host.docker.internal:11435"

  # -- Ministral --
  - model_name: "ministral-3-8b-instruct-4bit"
    litellm_params:
      model: "ollama/ministral-3-8b-instruct-4bit"
      api_base: "http://host.docker.internal:11435"

  # -- Qwen 3 --
  - model_name: "qwen3:8b"
    litellm_params:
      model: "ollama/qwen3:8b"
      api_base: "http://host.docker.internal:11435"
      num_ctx: 32768

  - model_name: "qwen3:8b-notk"
    litellm_params:
      model: "ollama/qwen3:8b-notk"
      api_base: "http://host.docker.internal:11435"
      num_ctx: 32768

  - model_name: "huihui_ai/qwen3-abliterated:8b"
    litellm_params:
      model: "ollama/huihui_ai/qwen3-abliterated:8b"
      api_base: "http://host.docker.internal:11435"

  # -- Qwen 2.5 Coder --
  - model_name: "qwen2.5-coder:7b"
    litellm_params:
      model: "ollama/qwen2.5-coder:7b"
      api_base: "http://host.docker.internal:11435"

  # -- DeepSeek --
  - model_name: "deepseek-r1:14b"
    litellm_params:
      model: "ollama/deepseek-r1:14b"
      api_base: "http://host.docker.internal:11435"
      num_ctx: 16384

  - model_name: "deepseek-r1:7b"
    litellm_params:
      model: "ollama/deepseek-r1:7b"
      api_base: "http://host.docker.internal:11435"

# -- Claude model aliases → route to ministral (same model as primary) --
  # Claude Code sends background requests using these model names internally.
  # IMPORTANT: These MUST route to the same Ollama model as the primary to
  # prevent GPU memory thrashing on single-GPU setups (e.g. RTX 3060 12GB).
  # Ollama can only hold one model at a time; loading a different model here
  # would evict the primary and cause 2-minute timeout cascades.
  - model_name: "claude-haiku-4-5-20251001"
    litellm_params:
      model: "ollama/ministral-3-8b-instruct-4bit"
      api_base: "http://host.docker.internal:11435"

  - model_name: "claude-sonnet-4-5-20250514"
    litellm_params:
      model: "ollama/ministral-3-8b-instruct-4bit"
      api_base: "http://host.docker.internal:11435"

  - model_name: "claude-opus-4-5-20250514"
    litellm_params:
      model: "ollama/ministral-3-8b-instruct-4bit"
      api_base: "http://host.docker.internal:11435"

# Wildcard fallback: any model not listed above is tried against Ollama
  - model_name: "ollama/*"
    litellm_params:
      model: "ollama/*"
      api_base: "http://host.docker.internal:11435"

litellm_settings:
  # Increase timeout for cold-start model loading
  request_timeout: 300
  # Drop Claude-specific params that Ollama doesn't support (e.g. context_management)
  drop_params: true
  # Drop internal usage tracking
  telemetry: false

general_settings:
  # LiteLLM listens on this port (4000 is taken by supabase-analytics)
  port: 4100
