# litellm proxy — Anthropic Messages API frontend for Ollama
#
# Deploy on the same host as Ollama (192.168.8.239).
# Nginx on 192.168.8.1 reverse-proxies litellm.lefv.info → this service.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f litellm
#   docker compose down

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    ports:
      - "4100:4100"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4100"
      - "--num_workers"
      - "2"
    # Ollama is in Docker too, exposed on host port 11435
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_API_BASE=http://host.docker.internal:11435
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4100/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
