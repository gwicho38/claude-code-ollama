# litellm.lefv.info — Anthropic Messages API proxy (backed by LiteLLM → Ollama)
#
# Mirrors the ollama.lefv.info setup: API key auth via Bearer token,
# reverse proxy to litellm on 192.168.8.239:4000.
#
# Install:
#   scp litellm.lefv.info.conf root@192.168.8.1:/etc/nginx/conf.d/
#   ssh root@192.168.8.1 nginx -t && ssh root@192.168.8.1 systemctl reload nginx

server {
    listen 80;
    server_name litellm.lefv.info;

    # --- API key authentication ---
    # Validate Bearer token from Authorization header.
    # Key is loaded from a separate file (not committed to git):
    #   echo 'set $expected_key "YOUR_KEY_HERE";' > /etc/nginx/conf.d/.api_key
    include /etc/nginx/conf.d/.api_key;

    # Extract token from "Bearer <token>"
    set $auth_token "";
    if ($http_authorization ~* "^Bearer\s+(.+)$") {
        set $auth_token $1;
    }

    # Allow health check without auth
    location = /health {
        proxy_pass http://192.168.8.239:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        # Reject if no token or wrong token
        if ($auth_token = "") {
            return 401 '{"error": "Missing API key. Use Authorization: Bearer <key>"}';
        }
        if ($auth_token != $expected_key) {
            return 403 '{"error": "Invalid API key"}';
        }

        # Proxy to litellm
        proxy_pass http://192.168.8.239:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # LLM inference can be slow (model loading, long generation)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        # Support streaming responses (SSE)
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
