# litellm.lefv.info — Anthropic Messages API proxy (backed by LiteLLM → Ollama)
#
# Mirrors the ollama-subdomain.conf pattern: Lua-based API key auth,
# reverse proxy to litellm on 192.168.8.239:4100.
#
# Install:
#   scp to root@192.168.8.1:/etc/nginx/conf.d/litellm-subdomain.conf
#   nginx -t && nginx -s reload

server {
    listen 80;
    listen [::]:80;
    server_name litellm.lefv.info;

    location / {
        access_by_lua '
            local auth = ngx.var.http_authorization
            if not auth then
                ngx.status = 401
                ngx.header.content_type = "application/json"
                ngx.say([[{"error":"Unauthorized"}]])
                return ngx.exit(401)
            end

            local token = auth:match("^[Bb]earer%s+(.+)$")
            if not token then
                ngx.status = 401
                ngx.header.content_type = "application/json"
                ngx.say([[{"error":"Unauthorized"}]])
                return ngx.exit(401)
            end

            local f = io.open("/etc/nginx/conf.d/ollama_api_keys.txt", "r")
            if not f then
                ngx.status = 500
                ngx.header.content_type = "application/json"
                ngx.say([[{"error":"Internal server error"}]])
                return ngx.exit(500)
            end

            local found = false
            for line in f:lines() do
                line = line:match("^%s*(.-)%s*$")
                if line == token then
                    found = true
                    break
                end
            end
            f:close()

            if not found then
                ngx.status = 401
                ngx.header.content_type = "application/json"
                ngx.say([[{"error":"Unauthorized"}]])
                return ngx.exit(401)
            end
        ';

        proxy_pass http://192.168.8.239:4100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        client_max_body_size 100M;

        # Timeouts for LLM operations (model loading + generation)
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # Disable buffering for streaming responses
        proxy_buffering off;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
    }
}
