# ollama.lefv.info — Direct Ollama API access
#
# Reference config — captures what's (likely) already deployed on 192.168.8.1.
# Keep this in sync with the live config.
#
# Install:
#   scp ollama.lefv.info.conf root@192.168.8.1:/etc/nginx/conf.d/
#   ssh root@192.168.8.1 nginx -t && ssh root@192.168.8.1 systemctl reload nginx

server {
    listen 80;
    server_name ollama.lefv.info;

    # --- API key authentication ---
    # Key is loaded from a separate file (not committed to git):
    #   echo 'set $expected_key "YOUR_KEY_HERE";' > /etc/nginx/conf.d/.api_key
    include /etc/nginx/conf.d/.api_key;

    set $auth_token "";
    if ($http_authorization ~* "^Bearer\s+(.+)$") {
        set $auth_token $1;
    }

    # Health check without auth
    location = / {
        proxy_pass http://192.168.8.239:11434;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        if ($auth_token = "") {
            return 401 '{"error": "Missing API key. Use Authorization: Bearer <key>"}';
        }
        if ($auth_token != $expected_key) {
            return 403 '{"error": "Invalid API key"}';
        }

        proxy_pass http://192.168.8.239:11434;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }
}
